<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AimanBot — Made by Aiman Shahid</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0eeff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1.page-title {
      font-size: 22px;
      font-weight: 600;
      color: #3C3489;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .chat-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      height: 600px;
      background: #ffffff;
      border: 1px solid #d6d3f5;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(83,74,183,0.10);
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid #ede9ff;
      background: #f5f3ff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bot-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #EEEDFE;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .bot-name { font-size: 15px; font-weight: 600; color: #3C3489; }
    .bot-status {
      font-size: 12px; color: #0F6E56;
      display: flex; align-items: center; gap: 4px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%; background: #1D9E75;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fafafa;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #d6d3f5; border-radius: 4px;
    }

    .msg { display: flex; gap: 8px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; flex-shrink: 0;
    }
    .msg-avatar.bot { background: #EEEDFE; color: #534AB7; }
    .msg-avatar.user { background: #E1F5EE; color: #0F6E56; }

    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
    }

    .msg.bot .msg-bubble {
      background: #fff;
      border: 1px solid #ede9ff;
      color: #2c2c2a;
      border-bottom-left-radius: 4px;
    }

    .msg.user .msg-bubble {
      background: #534AB7;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px; color: #aaa;
      margin-top: 3px;
    }
    .msg.bot .msg-time { text-align: left; padding-left: 38px; }
    .msg.user .msg-time { text-align: right; padding-right: 38px; }

    .typing {
      display: flex; gap: 4px; align-items: center;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #ede9ff;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #AFA9EC;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .suggestions {
      padding: 8px 14px;
      display: flex; gap: 6px; flex-wrap: wrap;
      border-top: 1px solid #ede9ff;
      background: #fff;
    }

    .suggestion-btn {
      font-size: 12px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid #d6d3f5;
      background: #f5f3ff;
      color: #534AB7;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .suggestion-btn:hover {
      background: #EEEDFE;
      border-color: #7F77DD;
    }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #ede9ff;
      background: #fff;
      display: flex; gap: 10px; align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 24px;
      border: 1px solid #d6d3f5;
      background: #f5f3ff;
      font-size: 14px;
      color: #2c2c2a;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: #7F77DD; background: #fff; }
    .chat-input::placeholder { color: #aaa; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #534AB7;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #3C3489; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn i { color: #fff; font-size: 17px; }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1 class="page-title">🤖 AimanBot</h1>

  <div class="chat-wrap">
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div>
        <div class="bot-name">AimanBot</div>
        <div class="bot-status"><span class="status-dot"></span> Online — Made by Aiman Shahid</div>
      </div>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('what is ai')">What is AI?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('tell me a joke')">Tell me a joke</button>
      <button class="suggestion-btn" onclick="sendSuggestion('what is 25*4')">25 × 4 = ?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('what is cybersecurity')">Cybersecurity</button>
      <button class="suggestion-btn" onclick="sendSuggestion('motivate me')">Motivate me!</button>
    </div>

    <div class="chat-input-area">
      <input class="chat-input" id="userInput" type="text" placeholder="Type a message..." autocomplete="off" />
      <button class="send-btn" onclick="handleSend()" aria-label="Send">
        <i class="ti ti-send"></i>
      </button>
    </div>
  </div>

  <p class="footer">Lab Project — Simple Chatbot using Rule-Based AI</p>

  <script>
    const responses = {
      "hello": "Hello! How can I help you today? 😊",
      "hi": "Hi there! Hope you're having a great day!",
      "hey": "Hey! What's up?",
      "how are you": "I'm doing great, thank you for asking!",
      "what is your name": "My name is AimanBot — made by Aiman Shahid!",
      "who made you": "I was made by the amazing Aiman Shahid! 🌟",
      "who created you": "Aiman Shahid created me as a lab project!",
      "what is ai": "AI stands for Artificial Intelligence — making computers smart enough to think, learn, and make decisions like humans! 🤖",
      "what is artificial intelligence": "Artificial Intelligence is the simulation of human intelligence by machines. It includes learning, reasoning, and problem-solving!",
      "what is machine learning": "Machine Learning is a part of AI where computers learn from data without being explicitly programmed. They improve with experience! 📊",
      "what is cybersecurity": "Cybersecurity is the practice of protecting computers, networks, and data from hackers, viruses, and cyber attacks. It keeps our digital world safe! 🔐",
      "what is python": "Python is a popular, easy-to-learn programming language used for AI, web development, data science, and much more! 🐍",
      "what is programming": "Programming means giving instructions to a computer to perform tasks — like teaching a computer what to do step by step! 💻",
      "what is internet": "The Internet is a global network connecting millions of computers worldwide, allowing people to share information and communicate! 🌐",
      "what is a chatbot": "A chatbot is a program that simulates conversation with humans using rules or AI. Like me! 😄",
      "what is the capital of pakistan": "The capital of Pakistan is Islamabad! 🇵🇰",
      "what is science": "Science is the study of the natural world through observation and experiments. It helps us understand how things work! 🔬",
      "what is mathematics": "Mathematics is the study of numbers, shapes, patterns, and logic. It is the foundation of all sciences! 🔢",
      "motivate me": "Believe in yourself Aiman! Every expert was once a beginner. Keep going! 💪🌟",
      "i am sad": "Don't be sad! You are capable of amazing things. Take a deep breath and keep going! 😊❤️",
      "i need help": "I'm here to help you! Ask me anything 😊"
    };

    const jokes = [
      "Why do programmers prefer dark mode? Because light attracts bugs! 🐛😂",
      "Why did the computer go to the doctor? Because it had a virus! 😂💻",
      "How do you comfort a JavaScript bug? You console it! 😄",
      "Why was the math book sad? It had too many problems! 😂📚",
      "What do you call a computer that sings? A Dell! 🎵😄"
    ];

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, sender) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + sender;
      const initial = sender === 'user' ? 'A' : '';
      const avatarContent = sender === 'bot'
        ? '<i class="ti ti-robot" style="font-size:15px"></i>'
        : initial;
      div.innerHTML = `
        <div class="msg-avatar ${sender}">${avatarContent}</div>
        <div>
          <div class="msg-bubble">${text}</div>
        </div>
      `;
      msgs.appendChild(div);
      const timeDiv = document.createElement('div');
      timeDiv.className = 'msg-time';
      timeDiv.textContent = getTime();
      msgs.appendChild(timeDiv);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg bot'; div.id = 'typing-ind';
      div.innerHTML = `
        <div class="msg-avatar bot"><i class="ti ti-robot" style="font-size:15px"></i></div>
        <div class="typing"><span></span><span></span><span></span></div>
      `;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-ind');
      if (t) t.remove();
    }

    function calculate(input) {
      try {
        const expr = input.replace(/what is/gi,'').replace(/calculate/gi,'').trim();
        if (/^[0-9+\-*\/().\s]+$/.test(expr)) {
          const result = Function('"use strict"; return (' + expr + ')')();
          if (typeof result === 'number' && isFinite(result)) {
            return 'The answer is: ' + (Number.isInteger(result) ? result : result.toFixed(2)) + ' 🧮';
          }
        }
      } catch(e) {}
      return null;
    }

    function getResponse(input) {
      const lower = input.toLowerCase().trim();
      if (['bye','exit','quit'].includes(lower))
        return "Goodbye Aiman! Keep coding and stay awesome! 👋😊";
      if (lower === 'tell me a joke' || lower === 'joke')
        return jokes[Math.floor(Math.random() * jokes.length)];
      if (responses[lower]) return responses[lower];
      if (/[+\-*\/]/.test(lower)) {
        const calc = calculate(lower);
        if (calc) return calc;
      }
      return "Hmm, I'm not sure about that! Try asking about AI, cybersecurity, math, or type 'tell me a joke'! 🤔";
    }

    function handleSend() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      input.value = '';
      showTyping();
      setTimeout(() => {
        removeTyping();
        addMessage(getResponse(text), 'bot');
      }, 600 + Math.random() * 400);
    }

    document.getElementById('userInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSend();
    });

    function sendSuggestion(text) {
      document.getElementById('userInput').value = text;
      handleSend();
    }

    setTimeout(() => {
      addMessage("Hello! I'm AimanBot 🤖 Made by Aiman Shahid. Ask me about AI, cybersecurity, math, or type 'tell me a joke'!", 'bot');
    }, 400);
  </script>
</body>
</html>
